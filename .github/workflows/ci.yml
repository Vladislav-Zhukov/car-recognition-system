name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/car_recognition
      REDIS_URL: redis://localhost:6379/0
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET_NAME: car-images
      SECRET_KEY: test_secret_key
      POSTGRES_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml

      - name: Check Python syntax
        run: |
          python -m compileall app ml

      - name: Check FastAPI import
        run: |
          python -c "from app.main import app; print(app.title)"

      - name: Run tests
        run: |
          pytest -v

      - name: Build Docker image
        run: |
          docker build -t car-recognition-system .

      - name: Validate Kubernetes YAML syntax
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          for path in pathlib.Path("k8s").glob("*.yaml"):
              with open(path, "r", encoding="utf-8") as f:
                  list(yaml.safe_load_all(f))
              print(f"OK: {path}")
          PY