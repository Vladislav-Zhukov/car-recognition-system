services:
  api:
    build: .
    container_name: car_recognition_api
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./trained_models:/app/trained_models
      - ./uploads:/app/uploads

  celery_worker:
    build: .
    container_name: car_recognition_celery_worker
    restart: always
    command: celery -A app.tasks worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./trained_models:/app/trained_models
      - ./uploads:/app/uploads

  arq_worker:
    build: .
    container_name: car_recognition_arq_worker
    restart: always
    command: arq app.arq_worker.WorkerSettings
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./trained_models:/app/trained_models
      - ./uploads:/app/uploads

  taskiq_worker:
    build: .
    container_name: car_recognition_taskiq_worker
    restart: always
    command: taskiq worker app.taskiq_tasks:broker
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./trained_models:/app/trained_models
      - ./uploads:/app/uploads

  db:
    image: postgres:17
    container_name: car_recognition_db
    restart: always
    environment:
      POSTGRES_DB: car_recognition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: car_recognition_redis
    restart: always

  minio:
    image: minio/minio
    container_name: car_recognition_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345;
      mc mb -p local/car-images;
      exit 0;
      "

  prometheus:
    image: prom/prometheus
    container_name: car_recognition_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    container_name: car_recognition_grafana
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data: