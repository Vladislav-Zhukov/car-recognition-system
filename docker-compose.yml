version: "3.9"

services:

  api:
    build: .
    container_name: car_recognition_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: car_recognition_worker

    command: celery -A app.tasks worker --loglevel=info

    env_file:
      - .env

    depends_on:
      - redis
      - db

  db:
    image: postgres:17

    container_name: car_recognition_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: car_recognition

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: car_recognition_redis

    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    container_name: car_recognition_minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345;
      mc mb -p local/car-images;
      exit 0;
      "

  prometheus:
    image: prom/prometheus
    container_name: car_recognition_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    container_name: car_recognition_grafana
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data: