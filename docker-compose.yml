version: "3.9"

services:

  api:
    build: .
    container_name: car_recognition_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: car_recognition_worker

    command: celery -A app.tasks worker --loglevel=info

    env_file:
      - .env

    depends_on:
      - redis
      - db

  db:
    image: postgres:17

    container_name: car_recognition_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: car_recognition

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: car_recognition_redis

    ports:
      - "6380:6379"

volumes:
  postgres_data: