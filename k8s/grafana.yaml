apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: car-recognition

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
        - name: grafana
          image: grafana/grafana

          ports:
            - containerPort: 3000

          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin

            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: car-recognition

spec:
  selector:
    app: grafana

  ports:
    - port: 3000
      targetPort: 3000