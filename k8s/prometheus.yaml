apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: car-recognition

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "car-recognition-api"
        metrics_path: "/metrics"
        static_configs:
          - targets: ["api:8000"]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: car-recognition

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
        - name: prometheus
          image: prom/prometheus

          ports:
            - containerPort: 9090

          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml

      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: car-recognition

spec:
  selector:
    app: prometheus

  ports:
    - port: 9090
      targetPort: 9090